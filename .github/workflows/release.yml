name: Release builds

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            build: packaging/build_windows.bat
            asset: Fetchly-windows-x64.zip
          - os: ubuntu-latest
            build: bash packaging/build_linux.sh
            asset: Fetchly-linux-glibc-x86_64.tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Tk (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3-tk

      - name: Build
        run: ${{ matrix.build }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path packaging/dist/Fetchly.exe, packaging/dist/fetchly-cli.exe -DestinationPath ${{ matrix.asset }}
        shell: pwsh

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: tar -czf "${{ matrix.asset }}" -C packaging/dist Fetchly fetchly-cli

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
          body: |
            Standalone builds — no Python required. Binaries are unsigned:
            - **Windows**: SmartScreen may warn on first run → "More info" → "Run anyway".
            - **macOS**: no prebuilt app (unsigned builds trip Gatekeeper's malware warning) — build from source with `packaging/build_macos.sh`, see the README.
            - **Linux**: `tar xzf`, then `./Fetchly` (GUI) or `./fetchly-cli <url>`.
            - **Arch/CachyOS**: prefer the `Fetchly-linux-x86_64.tar.gz` asset (built on Arch) or `packaging/arch/PKGBUILD`.

            JavaScript rendering is not bundled (would add ~300 MB); use the pip install with `fetchly[js]` for that.
